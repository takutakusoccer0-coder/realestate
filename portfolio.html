<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポートフォリオ管理 | お豆腐不動産株式会社</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;--surface:#111827;--surface2:#1a2235;--surface3:#1e2a40;
  --border:#1e3a5f;--border2:#2a4a7f;
  --teal:#2dd4bf;--teal2:#5eead4;--teal3:rgba(45,212,191,0.15);
  --blue:#3b82f6;--blue2:#60a5fa;
  --green:#10b981;--green2:#34d399;
  --warn:#f59e0b;--danger:#ef4444;--muted:#64748b;
  --text:#e2e8f0;--text2:#cbd5e1;
  --font-serif:'Noto Serif JP',serif;--font-sans:'Noto Sans JP',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --radius:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;min-height:100vh;line-height:1.6}

/* ── Login ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
#loginScreen.hidden{display:none}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 48px;width:360px;text-align:center}
.login-logo{font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--teal);margin-bottom:4px}
.login-sub{font-size:11px;color:var(--muted);margin-bottom:28px}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;padding:12px 16px;text-align:center;letter-spacing:0.1em;outline:none;transition:border-color 0.2s}
.login-input:focus{border-color:var(--teal)}
.login-btn{margin-top:14px;width:100%;padding:12px;background:var(--teal);color:#0a0f1a;font-weight:700;font-size:14px;border:none;border-radius:8px;cursor:pointer;transition:background 0.2s;font-family:var(--font-sans)}
.login-btn:hover{background:var(--teal2)}
.login-error{margin-top:10px;font-size:12px;color:var(--danger);min-height:18px}

/* ── Layout ── */
#appContent{display:none}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;padding:32px 36px 80px;overflow-y:auto}

/* ── Sidebar ── */
.sidebar-header{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-family:var(--font-serif);font-size:12px;font-weight:700;color:var(--teal);letter-spacing:0.06em}
.sidebar-sub{font-size:9px;color:var(--muted);margin-top:2px}
.sidebar-link{display:block;padding:6px 18px 6px 14px;font-size:11px;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:all 0.2s}
.sidebar-link:hover{color:var(--text);border-left-color:var(--border2)}
.sidebar-section{padding:14px 18px 6px;font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;border-top:1px solid var(--border);margin-top:8px}
.prop-nav-item{display:flex;align-items:center;gap:8px;padding:7px 18px;cursor:pointer;font-size:11px;color:var(--muted);transition:all 0.2s;border-left:2px solid transparent}
.prop-nav-item:hover{color:var(--text);background:var(--surface2)}
.prop-nav-item.active{color:var(--teal);border-left-color:var(--teal);background:rgba(45,212,191,0.06)}
.prop-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.prop-nav-item.active .prop-dot{background:var(--teal)}
.btn-add-prop{margin:8px 14px;padding:8px;border:1px dashed var(--border);border-radius:6px;background:none;color:var(--muted);font-size:11px;cursor:pointer;width:calc(100% - 28px);transition:all 0.2s;font-family:var(--font-sans)}
.btn-add-prop:hover{border-color:var(--teal);color:var(--teal)}

/* ── Header ── */
.page-header{margin-bottom:28px}
.breadcrumb{font-size:10px;color:var(--muted);margin-bottom:6px}
.breadcrumb a{color:var(--teal);text-decoration:none}
.page-title{font-family:var(--font-serif);font-size:22px;font-weight:700;color:var(--text)}
.page-title span{color:var(--teal)}
.page-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:6px;font-size:11px;font-family:var(--font-sans);cursor:pointer;border:none;font-weight:500;transition:all 0.2s;letter-spacing:0.04em}
.btn-teal{background:var(--teal);color:#0a0f1a;font-weight:700}
.btn-teal:hover{background:var(--teal2)}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}

/* ── Tabs ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;gap:0}
.tab-btn{padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:var(--font-sans);font-weight:500;transition:all 0.2s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── KPI Cards ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--blue))}
.kpi-label{font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:700;font-family:var(--font-mono)}
.kpi-val.positive{color:var(--green2)}
.kpi-val.negative{color:var(--danger)}
.kpi-val.teal{color:var(--teal)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* ── Section ── */
.section-title{font-size:13px;font-weight:700;color:var(--teal);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:14px;background:var(--teal);border-radius:2px;flex-shrink:0}

/* ── Property Card ── */
.prop-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:24px}
.prop-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative}
.prop-card:hover{border-color:var(--border2);background:var(--surface2)}
.prop-card.selected{border-color:var(--teal);background:rgba(45,212,191,0.04)}
.prop-card-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.prop-card-addr{font-size:11px;color:var(--muted);margin-bottom:10px}
.prop-card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pcs-item{text-align:center}
.pcs-label{font-size:9px;color:var(--muted)}
.pcs-val{font-size:13px;font-weight:700;color:var(--teal);font-family:var(--font-mono)}

/* ── Balance Sheet ── */
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.bs-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.bs-panel-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.bs-panel-title.asset{color:var(--teal)}
.bs-panel-title.debt{color:var(--danger)}
.bs-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(30,58,95,0.5);font-size:12px}
.bs-row:last-child{border-bottom:none}
.bs-row-label{color:var(--muted)}
.bs-row-val{font-family:var(--font-mono);font-weight:600}
.bs-total{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;margin-top:8px;border-top:1px solid var(--border);font-weight:700;font-size:13px}
.bs-net{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.bs-net-label{font-size:12px;color:var(--muted)}
.bs-net-val{font-size:22px;font-weight:900;font-family:var(--font-mono)}

/* ── Monthly CF ── */
.month-selector{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.month-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);cursor:pointer;font-size:14px;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.month-btn:hover{border-color:var(--teal);color:var(--teal)}
.month-label{font-size:14px;font-weight:700;color:var(--text);min-width:100px;text-align:center;font-family:var(--font-mono)}
.cf-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.cf-table th{background:var(--surface2);border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap}
.cf-table td{border:1px solid var(--border);padding:7px 12px;vertical-align:middle}
.cf-table tr:hover td{background:rgba(45,212,191,0.03)}
.cf-table input[type=number]{background:transparent;border:none;color:var(--teal);font-size:12px;font-family:var(--font-mono);text-align:right;width:100%;padding:2px 4px;outline:none}
.cf-table input[type=number]:focus{background:rgba(45,212,191,0.06);border-radius:3px}
.cf-cat{background:rgba(30,58,95,0.4);font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.08em}
.cf-total-row td{font-weight:700;background:rgba(45,212,191,0.05);color:var(--teal)}
.cf-summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.cf-sum-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.cf-sum-label{font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
.cf-sum-val{font-size:16px;font-weight:700;font-family:var(--font-mono)}

/* ── Annual Summary ── */
.annual-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px;min-width:700px}
.annual-table-wrap{overflow-x:auto}
.annual-table th{background:var(--surface2);border:1px solid var(--border);padding:8px 10px;text-align:center;font-size:10px;color:var(--muted);white-space:nowrap}
.annual-table td{border:1px solid var(--border);padding:6px 10px;text-align:right;font-size:11px;font-family:var(--font-mono);white-space:nowrap}
.annual-table td.row-head{text-align:left;color:var(--text2);font-family:var(--font-sans);background:var(--surface2);font-size:11px}
.annual-table td.cat-head{text-align:left;color:var(--teal);font-size:10px;font-weight:700;background:rgba(30,58,95,0.4);letter-spacing:0.06em}
.annual-table td.total-cell{font-weight:700;color:var(--teal)}
.annual-table tr.total-row td{background:rgba(45,212,191,0.05);font-weight:700;color:var(--teal)}

/* ── Property Form ── */
.prop-form{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--muted);letter-spacing:0.06em;margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:8px 10px;outline:none;font-family:var(--font-sans);transition:border-color 0.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal)}
.field input[readonly]{color:var(--teal);background:rgba(45,212,191,0.04)}

/* ── Chart ── */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;height:280px;position:relative}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--teal);border-radius:8px;padding:10px 18px;font-size:12px;color:var(--teal);z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── Divider ── */
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.subsec{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:10px;margin-top:16px}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:16px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .bs-grid{grid-template-columns:1fr}
  .cf-summary-cards{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🏢 お豆腐不動産株式会社</div>
    <div class="login-sub">ポートフォリオ管理シート</div>
    <input type="password" class="login-input" id="loginInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="appContent">
<div class="app">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">📊 ポートフォリオ</div>
    <div class="sidebar-sub">お豆腐不動産株式会社</div>
  </div>
  <div style="padding:10px 0">
    <a class="sidebar-link" href="realestate-dd.html">← DDシートに戻る</a>
  </div>
  <div class="sidebar-section">保有物件</div>
  <div id="propNavList"></div>
  <button class="btn-add-prop" onclick="addProperty()">＋ 物件を追加</button>
</aside>

<!-- Main -->
<main class="main">
  <div class="page-header">
    <div class="breadcrumb"><a href="realestate-dd.html">DDシート</a> / ポートフォリオ管理</div>
    <div class="page-title">ポートフォリオ <span id="headerPropName">全物件</span></div>
    <div class="page-actions">
      <button class="btn btn-ghost" onclick="syncFromDD()">🔄 DDシートから同期</button>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV出力</button>
      <button class="btn btn-teal" onclick="saveAll()">💾 保存</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('bs')">📋 バランスシート</button>
    <button class="tab-btn" onclick="switchTab('cf')">💰 月次CF管理</button>
    <button class="tab-btn" onclick="switchTab('annual')">📅 年次収支サマリー</button>
    <button class="tab-btn" onclick="switchTab('props')">🏠 物件登録</button>
  </div>

  <!-- ══ バランスシート ══ -->
  <div class="tab-panel active" id="tab-bs">
    <div class="kpi-row" id="bsKpiRow"></div>
    <div class="section-title">純資産（ネットワース）</div>
    <div class="bs-net">
      <div>
        <div class="bs-net-label">総資産 − 総負債</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px" id="bsNetSub">—</div>
      </div>
      <div class="bs-net-val" id="bsNetVal">—</div>
    </div>
    <div class="bs-grid" id="bsGrid"></div>
    <div class="chart-wrap"><canvas id="bsChart"></canvas></div>
  </div>

  <!-- ══ 月次CF ══ -->
  <div class="tab-panel" id="tab-cf">
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">◀</button>
      <div class="month-label" id="monthLabel">—</div>
      <button class="month-btn" onclick="changeMonth(1)">▶</button>
      <select id="cfPropSelect" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;outline:none" onchange="renderCFTable()">
        <option value="all">全物件合計</option>
      </select>
    </div>
    <div class="cf-summary-cards" id="cfSummaryCards"></div>
    <table class="cf-table" id="cfTable"></table>
    <div class="chart-wrap"><canvas id="cfChart"></canvas></div>
  </div>

  <!-- ══ 年次収支 ══ -->
  <div class="tab-panel" id="tab-annual">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap">
      <select id="annualYear" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 12px;font-size:12px;outline:none" onchange="renderAnnual()"></select>
      <span style="font-size:11px;color:var(--muted)">確定申告・銀行提出用</span>
      <button class="btn btn-ghost" onclick="exportAnnualCSV()">⬇ CSV出力</button>
    </div>
    <div class="kpi-row" id="annualKpiRow"></div>
    <div class="annual-table-wrap"><table class="annual-table" id="annualTable"></table></div>
    <div class="chart-wrap"><canvas id="annualChart"></canvas></div>
  </div>

  <!-- ══ 物件登録 ══ -->
  <div class="tab-panel" id="tab-props">
    <div id="propFormList"></div>
    <button class="btn btn-teal" onclick="addProperty()" style="margin-top:8px">＋ 物件を追加</button>
  </div>

</main>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ DATA LAYER ══
const PF_KEY = 'pf_properties';
const CF_KEY = 'pf_cf_data';

function getProps(){try{return JSON.parse(localStorage.getItem(PF_KEY)||'[]')}catch{return[]}}
function saveProps(arr){localStorage.setItem(PF_KEY,JSON.stringify(arr))}
function getCFData(){try{return JSON.parse(localStorage.getItem(CF_KEY)||'{}')}catch{return{}}}
function saveCFData(d){localStorage.setItem(CF_KEY,JSON.stringify(d))}

// ── Sync from DD sheet ──
function syncFromDD(){
  try{
    const ddProps=JSON.parse(localStorage.getItem('dd_properties')||'[]');
    const kounyuzumi=ddProps.filter(p=>p.status==='kounyuzumi');
    if(!kounyuzumi.length){showToast('DDシートに「購入済み」の物件がありません');return}
    const existing=getProps();
    let added=0;
    kounyuzumi.forEach(ddp=>{
      if(existing.find(p=>p.ddId===ddp.id))return; // already imported
      const d=ddp.data||{};
      existing.push({
        id:'pf_'+Date.now()+'_'+Math.random().toString(36).slice(2),
        ddId:ddp.id,
        name:ddp.name||'物件',
        addr:d.propAddr||'',
        price:parseFloat(d.propPrice)||0,
        buildYear:parseInt(d.propBuildYear)||0,
        structure:d.propStructure||'',
        units:parseInt(d.propUnits)||0,
        loanBalance:0,
        loanPayment:parseFloat(d.simDownPay)||0,
        loanRate:parseFloat(d.simRate)||2,
        loanTerm:parseInt(d.simTerm)||25,
        purchaseDate:ddp.createdAt?ddp.createdAt.slice(0,7):'',
        landPrice:parseFloat(d.propLandPrice)||0,
        buildingPrice:parseFloat(d.propBuildingPrice)||0,
        fullRent:parseFloat(d.rentFullMonth)||0,
        taxAssessLand:0,taxAssessBuilding:0,
        memo:d.propMemo||'',
      });
      added++;
    });
    saveProps(existing);
    renderAll();
    showToast('✓ '+added+'件の購入済み物件を取り込みました');
  }catch(e){showToast('同期エラー: '+e.message)}
}

// ── Property CRUD ──
function addProperty(){
  const props=getProps();
  const p={
    id:'pf_'+Date.now(),ddId:null,
    name:'物件 '+(props.length+1),addr:'',
    price:0,buildYear:0,structure:'',units:0,
    loanBalance:0,loanPayment:0,loanRate:2,loanTerm:25,
    purchaseDate:'',landPrice:0,buildingPrice:0,
    fullRent:0,taxAssessLand:0,taxAssessBuilding:0,memo:'',
  };
  props.push(p);saveProps(props);
  switchTab('props');renderAll();
  showToast('物件を追加しました');
}
function deleteProperty(id){
  if(!confirm('この物件を削除しますか？'))return;
  saveProps(getProps().filter(p=>p.id!==id));renderAll();showToast('削除しました');
}
function updateProp(id,field,val){
  const props=getProps();const p=props.find(x=>x.id===id);if(!p)return;
  p[field]=isNaN(val)||val===''?val:parseFloat(val)||val;
  saveProps(props);renderKPIs();renderNavList();
}

// ══ CF DATA ══
const CF_ITEMS=[
  {cat:'収入',key:'rent',label:'家賃収入'},
  {cat:'収入',key:'parking',label:'駐車場収入'},
  {cat:'収入',key:'other_income',label:'その他収入'},
  {cat:'支出',key:'loan',label:'ローン返済'},
  {cat:'支出',key:'mgmt',label:'管理費'},
  {cat:'支出',key:'repair',label:'修繕費'},
  {cat:'支出',key:'tax_prop',label:'固定資産税'},
  {cat:'支出',key:'insurance',label:'火災保険'},
  {cat:'支出',key:'tax_income',label:'所得税・住民税'},
  {cat:'支出',key:'other_exp',label:'その他支出'},
];

function getCFKey(propId,ym){return propId+'_'+ym}
function getCFVal(propId,ym,key){
  const d=getCFData();
  return d[getCFKey(propId,ym)]?.[key]||0;
}
function setCFVal(propId,ym,key,val){
  const d=getCFData();
  const k=getCFKey(propId,ym);
  if(!d[k])d[k]={};
  d[k][key]=parseFloat(val)||0;
  saveCFData(d);
  renderCFSummary();
  renderCFChart();
}

// ══ STATE ══
let currentMonth=new Date().toISOString().slice(0,7);
let cfChart=null,bsChart=null,annualChart=null;

// ══ UI ══
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function fmt(n,unit='万円'){
  if(n===undefined||n===null||isNaN(n))return '—';
  return Math.round(n).toLocaleString()+unit;
}
function fmtM(n){return n>=0?'+'+fmt(n):fmt(n)}

function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['bs','cf','annual','props'][i]===id);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='bs')renderBS();
  if(id==='cf'){renderCFTable();renderCFChart();}
  if(id==='annual')renderAnnual();
  if(id==='props')renderPropForms();
}

// ══ NAV LIST ══
function renderNavList(){
  const props=getProps();
  const nav=document.getElementById('propNavList');
  if(!props.length){nav.innerHTML='<div style="padding:10px 18px;font-size:10px;color:var(--muted)">物件なし</div>';return}
  nav.innerHTML=props.map(p=>`
    <div class="prop-nav-item" onclick="selectProp('${p.id}')">
      <div class="prop-dot"></div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name||'未設定'}</span>
    </div>`).join('');
}

function selectProp(id){
  document.getElementById('cfPropSelect').value=id;
  switchTab('cf');renderCFTable();renderCFChart();
}

// ══ BALANCE SHEET ══
function renderBS(){
  const props=getProps();
  // KPIs
  const totalAsset=props.reduce((s,p)=>{
    const land=p.landPrice||p.taxAssessLand||0;
    const bld=p.buildingPrice||p.taxAssessBuilding||0;
    return s+(land+bld||p.price||0);
  },0);
  const totalDebt=props.reduce((s,p)=>s+(p.loanBalance||0),0);
  const netWorth=totalAsset-totalDebt;
  const totalRent=props.reduce((s,p)=>s+(p.fullRent||0)*12,0);
  const ltv=totalAsset>0?Math.round(totalDebt/totalAsset*100):0;

  document.getElementById('bsKpiRow').innerHTML=[
    {label:'総資産',val:fmt(totalAsset/10000,'億円'),cls:'teal',sub:props.length+'物件'},
    {label:'総負債（借入残高）',val:fmt(totalDebt/10000,'億円'),cls:totalDebt>0?'':'positive',sub:'LTV '+ltv+'%'},
    {label:'純資産（ネットワース）',val:fmt(netWorth/10000,'億円'),cls:netWorth>=0?'positive':'negative',sub:'資産−負債'},
    {label:'年間満室収入',val:fmt(totalRent,'万円/年'),cls:'teal',sub:'月'+(Math.round(totalRent/12)).toLocaleString()+'万円'},
  ].map(k=>`<div class="kpi-card"><div class="kpi-label">${k.label}</div><div class="kpi-val ${k.cls}">${k.val}</div><div class="kpi-sub">${k.sub}</div></div>`).join('');

  // Net worth display
  const nwEl=document.getElementById('bsNetVal');
  nwEl.textContent=fmt(netWorth,'万円');
  nwEl.style.color=netWorth>=0?'var(--green2)':'var(--danger)';
  document.getElementById('bsNetSub').textContent=`総資産 ${fmt(totalAsset,'万円')} − 総負債 ${fmt(totalDebt,'万円')}`;

  // Balance sheet panels
  const grid=document.getElementById('bsGrid');
  const assetRows=props.map(p=>{
    const v=(p.landPrice||p.taxAssessLand||0)+(p.buildingPrice||p.taxAssessBuilding||0)||p.price||0;
    return `<div class="bs-row"><span class="bs-row-label">${p.name}</span><span class="bs-row-val" style="color:var(--teal)">${fmt(v,'万円')}</span></div>`;
  }).join('');
  const debtRows=props.filter(p=>p.loanBalance>0).map(p=>
    `<div class="bs-row"><span class="bs-row-label">${p.name}（借入）</span><span class="bs-row-val" style="color:var(--danger)">${fmt(p.loanBalance,'万円')}</span></div>`
  ).join('');

  grid.innerHTML=`
    <div class="bs-panel">
      <div class="bs-panel-title asset">資産の部</div>
      ${assetRows||'<div style="color:var(--muted);font-size:11px">物件を登録してください</div>'}
      <div class="bs-total"><span>資産合計</span><span style="color:var(--teal);font-family:var(--font-mono)">${fmt(totalAsset,'万円')}</span></div>
    </div>
    <div class="bs-panel">
      <div class="bs-panel-title debt">負債の部</div>
      ${debtRows||'<div style="color:var(--muted);font-size:11px">借入残高を入力してください</div>'}
      <div class="bs-total"><span>負債合計</span><span style="color:var(--danger);font-family:var(--font-mono)">${fmt(totalDebt,'万円')}</span></div>
    </div>`;

  // BS Pie chart
  if(bsChart)bsChart.destroy();
  const ctx=document.getElementById('bsChart').getContext('2d');
  const propNames=props.map(p=>p.name||'—');
  const propVals=props.map(p=>(p.landPrice||p.taxAssessLand||0)+(p.buildingPrice||p.taxAssessBuilding||0)||p.price||0);
  bsChart=new Chart(ctx,{type:'doughnut',data:{labels:propNames,datasets:[{data:propVals,backgroundColor:['rgba(45,212,191,0.7)','rgba(59,130,246,0.7)','rgba(16,185,129,0.7)','rgba(245,158,11,0.7)','rgba(139,92,246,0.7)'],borderColor:'var(--bg)',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#64748b',font:{size:11}}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw,'万円')}}}}});
}

// ══ MONTHLY CF ══
function changeMonth(d){
  const dt=new Date(currentMonth+'-01');
  dt.setMonth(dt.getMonth()+d);
  currentMonth=dt.toISOString().slice(0,7);
  document.getElementById('monthLabel').textContent=currentMonth.replace('-','年')+'月';
  renderCFTable();renderCFChart();
}

function renderCFSummary(){
  const props=getProps();
  const propId=document.getElementById('cfPropSelect')?.value||'all';
  const ym=currentMonth;
  const targets=propId==='all'?props.map(p=>p.id):[propId];

  let totalIncome=0,totalExpense=0;
  targets.forEach(pid=>{
    CF_ITEMS.forEach(item=>{
      const v=getCFVal(pid,ym,item.key);
      if(item.cat==='収入')totalIncome+=v;
      else totalExpense+=v;
    });
  });
  const netCF=totalIncome-totalExpense;

  document.getElementById('cfSummaryCards').innerHTML=[
    {label:'収入合計',val:fmt(totalIncome,'万円'),color:'var(--green2)'},
    {label:'支出合計',val:fmt(totalExpense,'万円'),color:'var(--danger)'},
    {label:'純CF（手残り）',val:fmtM(netCF)+'万円',color:netCF>=0?'var(--teal)':'var(--danger)'},
  ].map(c=>`<div class="cf-sum-card"><div class="cf-sum-label">${c.label}</div><div class="cf-sum-val" style="color:${c.color}">${c.val}</div></div>`).join('');
}

function renderCFTable(){
  const props=getProps();
  const propId=document.getElementById('cfPropSelect')?.value||'all';
  const ym=currentMonth;
  document.getElementById('monthLabel').textContent=ym.replace('-','年')+'月';
  renderCFSummary();

  const targets=propId==='all'?props:props.filter(p=>p.id===propId);
  const table=document.getElementById('cfTable');
  if(!targets.length){table.innerHTML='<tr><td style="padding:20px;color:var(--muted)">物件を登録してください</td></tr>';return}

  let html=`<thead><tr><th>項目</th>${targets.map(p=>`<th>${p.name||'—'}</th>`).join('')}${targets.length>1?'<th>合計</th>':''}</tr></thead><tbody>`;
  let currentCat='';
  let incomeTotal=new Array(targets.length).fill(0);
  let expenseTotal=new Array(targets.length).fill(0);

  CF_ITEMS.forEach(item=>{
    if(item.cat!==currentCat){
      currentCat=item.cat;
      html+=`<tr class="cf-cat"><td colspan="${targets.length+(targets.length>1?2:1)}" style="padding:7px 12px">${item.cat==='収入'?'📈':'📉'} ${item.cat}</td></tr>`;
    }
    const vals=targets.map(p=>getCFVal(p.id,ym,item.key));
    const rowTotal=vals.reduce((a,b)=>a+b,0);
    vals.forEach((v,i)=>{if(item.cat==='収入')incomeTotal[i]+=v;else expenseTotal[i]+=v;});
    html+=`<tr><td style="color:var(--text2)">${item.label}</td>`;
    targets.forEach((p,i)=>{
      html+=`<td><input type="number" value="${vals[i]||''}" placeholder="0" onchange="setCFVal('${p.id}','${ym}','${item.key}',this.value)"></td>`;
    });
    if(targets.length>1)html+=`<td style="color:var(--muted);font-family:var(--font-mono)">${rowTotal?Math.round(rowTotal).toLocaleString():''}</td>`;
    html+=`</tr>`;
  });

  // Totals
  const netTotals=targets.map((_,i)=>incomeTotal[i]-expenseTotal[i]);
  html+=`<tr class="cf-total-row"><td>収入合計</td>${incomeTotal.map(v=>`<td>${Math.round(v).toLocaleString()}</td>`).join('')}${targets.length>1?`<td>${Math.round(incomeTotal.reduce((a,b)=>a+b,0)).toLocaleString()}</td>`:''}</tr>`;
  html+=`<tr class="cf-total-row"><td>支出合計</td>${expenseTotal.map(v=>`<td>${Math.round(v).toLocaleString()}</td>`).join('')}${targets.length>1?`<td>${Math.round(expenseTotal.reduce((a,b)=>a+b,0)).toLocaleString()}</td>`:''}</tr>`;
  html+=`<tr class="cf-total-row"><td style="font-weight:900">純CF</td>${netTotals.map(v=>`<td style="color:${v>=0?'var(--teal)':'var(--danger)'}">${Math.round(v).toLocaleString()}</td>`).join('')}${targets.length>1?`<td style="color:${netTotals.reduce((a,b)=>a+b,0)>=0?'var(--teal)':'var(--danger)'}">${Math.round(netTotals.reduce((a,b)=>a+b,0)).toLocaleString()}</td>`:''}</tr>`;
  html+=`</tbody>`;
  table.innerHTML=html;
}

function renderCFChart(){
  const props=getProps();
  const propId=document.getElementById('cfPropSelect')?.value||'all';
  const targets=propId==='all'?props:props.filter(p=>p.id===propId);

  // Build last 12 months
  const months=[];
  for(let i=11;i>=0;i--){
    const d=new Date(currentMonth+'-01');
    d.setMonth(d.getMonth()-i);
    months.push(d.toISOString().slice(0,7));
  }
  const incomeArr=months.map(ym=>targets.reduce((s,p)=>s+CF_ITEMS.filter(i=>i.cat==='収入').reduce((ss,item)=>ss+getCFVal(p.id,ym,item.key),0),0));
  const expenseArr=months.map(ym=>targets.reduce((s,p)=>s+CF_ITEMS.filter(i=>i.cat==='支出').reduce((ss,item)=>ss+getCFVal(p.id,ym,item.key),0),0));
  const netArr=months.map((_,i)=>incomeArr[i]-expenseArr[i]);

  if(cfChart)cfChart.destroy();
  const ctx=document.getElementById('cfChart').getContext('2d');
  cfChart=new Chart(ctx,{type:'bar',data:{labels:months.map(m=>m.slice(5)+'月'),datasets:[
    {label:'収入',data:incomeArr,backgroundColor:'rgba(16,185,129,0.6)',type:'bar'},
    {label:'支出',data:expenseArr,backgroundColor:'rgba(239,68,68,0.5)',type:'bar'},
    {label:'純CF',data:netArr,borderColor:'var(--teal)',backgroundColor:'rgba(45,212,191,0.1)',type:'line',borderWidth:2,fill:true,tension:0.3,pointRadius:3,yAxisID:'y'},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748b',font:{size:10}}}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'rgba(30,58,95,0.5)'}},y:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'rgba(30,58,95,0.5)'}}}}});
}

// ══ ANNUAL SUMMARY ══
function renderAnnual(){
  const year=parseInt(document.getElementById('annualYear')?.value)||new Date().getFullYear();
  const props=getProps();
  const months=Array.from({length:12},(_,i)=>year+'-'+(String(i+1).padStart(2,'0')));

  // Calc per prop per month
  const data={};
  CF_ITEMS.forEach(item=>{
    data[item.key]=props.map(p=>({
      name:p.name,
      monthly:months.map(ym=>getCFVal(p.id,ym,item.key)),
    }));
  });

  // Annual totals per prop
  const annualIncome=props.map(p=>months.reduce((s,ym)=>s+CF_ITEMS.filter(i=>i.cat==='収入').reduce((ss,item)=>ss+getCFVal(p.id,ym,item.key),0),0));
  const annualExpense=props.map(p=>months.reduce((s,ym)=>s+CF_ITEMS.filter(i=>i.cat==='支出').reduce((ss,item)=>ss+getCFVal(p.id,ym,item.key),0),0));
  const annualNet=props.map((_,i)=>annualIncome[i]-annualExpense[i]);
  const totalIncome=annualIncome.reduce((a,b)=>a+b,0);
  const totalExpense=annualExpense.reduce((a,b)=>a+b,0);
  const totalNet=totalIncome-totalExpense;

  // KPIs
  document.getElementById('annualKpiRow').innerHTML=[
    {label:year+'年 収入合計',val:fmt(totalIncome,'万円'),cls:'teal'},
    {label:year+'年 支出合計',val:fmt(totalExpense,'万円'),cls:''},
    {label:year+'年 純CF合計',val:fmt(totalNet,'万円'),cls:totalNet>=0?'positive':'negative'},
    {label:'月平均CF',val:fmt(totalNet/12,'万円/月'),cls:totalNet>=0?'teal':''},
  ].map(k=>`<div class="kpi-card"><div class="kpi-label">${k.label}</div><div class="kpi-val ${k.cls}">${k.val}</div></div>`).join('');

  // Table
  const table=document.getElementById('annualTable');
  let html=`<thead><tr><th>項目</th>${months.map(m=>m.slice(5)+'月').join('</th><th>')}</th><th>年計</th></tr></thead><tbody>`;

  let currentCat='';
  CF_ITEMS.forEach(item=>{
    if(item.cat!==currentCat){
      currentCat=item.cat;
      html+=`<tr><td class="cat-head" colspan="${14}">${item.cat}</td></tr>`;
    }
    // aggregate all props
    const monthly=months.map(ym=>props.reduce((s,p)=>s+getCFVal(p.id,ym,item.key),0));
    const total=monthly.reduce((a,b)=>a+b,0);
    html+=`<tr><td class="row-head">${item.label}</td>${monthly.map(v=>`<td>${v?Math.round(v).toLocaleString():''}</td>`).join('')}<td class="total-cell">${total?Math.round(total).toLocaleString():''}</td></tr>`;
  });
  // totals
  const incomeMonthly=months.map(ym=>props.reduce((s,p)=>s+CF_ITEMS.filter(i=>i.cat==='収入').reduce((ss,item)=>ss+getCFVal(p.id,ym,item.key),0),0));
  const expMonthly=months.map(ym=>props.reduce((s,p)=>s+CF_ITEMS.filter(i=>i.cat==='支出').reduce((ss,item)=>ss+getCFVal(p.id,ym,item.key),0),0));
  const netMonthly=incomeMonthly.map((v,i)=>v-expMonthly[i]);
  html+=`<tr class="total-row"><td class="row-head">収入合計</td>${incomeMonthly.map(v=>`<td>${Math.round(v).toLocaleString()}</td>`).join('')}<td>${Math.round(totalIncome).toLocaleString()}</td></tr>`;
  html+=`<tr class="total-row"><td class="row-head">支出合計</td>${expMonthly.map(v=>`<td>${Math.round(v).toLocaleString()}</td>`).join('')}<td>${Math.round(totalExpense).toLocaleString()}</td></tr>`;
  html+=`<tr class="total-row"><td class="row-head" style="color:var(--teal);font-weight:900">純CF</td>${netMonthly.map(v=>`<td style="color:${v>=0?'var(--teal)':'var(--danger)'}">${Math.round(v).toLocaleString()}</td>`).join('')}<td style="color:${totalNet>=0?'var(--teal)':'var(--danger)'};font-weight:900">${Math.round(totalNet).toLocaleString()}</td></tr>`;
  html+=`</tbody>`;
  table.innerHTML=html;

  // Chart
  if(annualChart)annualChart.destroy();
  const ctx=document.getElementById('annualChart').getContext('2d');
  annualChart=new Chart(ctx,{type:'bar',data:{labels:months.map(m=>m.slice(5)+'月'),datasets:[
    {label:'収入',data:incomeMonthly,backgroundColor:'rgba(16,185,129,0.6)'},
    {label:'支出',data:expMonthly,backgroundColor:'rgba(239,68,68,0.5)'},
    {label:'純CF',data:netMonthly,borderColor:'var(--teal)',backgroundColor:'rgba(45,212,191,0.1)',type:'line',borderWidth:2,fill:true,tension:0.3,pointRadius:3},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748b',font:{size:10}}}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'rgba(30,58,95,0.5)'}},y:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'rgba(30,58,95,0.5)'}}}}});
}

// ══ EXPORT ══
function exportCSV(){
  const props=getProps();
  const rows=[['物件名','所在地','取得価格','借入残高','土地価格','建物価格','満室家賃/月','純資産']];
  props.forEach(p=>{
    const asset=(p.landPrice||0)+(p.buildingPrice||0)||p.price||0;
    rows.push([p.name,p.addr,p.price,p.loanBalance,p.landPrice,p.buildingPrice,p.fullRent,asset-(p.loanBalance||0)]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='portfolio_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  showToast('CSVを出力しました');
}
function exportAnnualCSV(){
  const year=parseInt(document.getElementById('annualYear')?.value)||new Date().getFullYear();
  const props=getProps();
  const months=Array.from({length:12},(_,i)=>year+'-'+(String(i+1).padStart(2,'0')));
  const rows=[['項目',...months.map(m=>m.slice(5)+'月'),'年計']];
  CF_ITEMS.forEach(item=>{
    const monthly=months.map(ym=>props.reduce((s,p)=>s+getCFVal(p.id,ym,item.key),0));
    rows.push([item.label,...monthly,monthly.reduce((a,b)=>a+b,0)]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='annual_'+year+'.csv';a.click();
  showToast('年次収支CSVを出力しました');
}
function saveAll(){saveProps(getProps());saveCFData(getCFData());showToast('保存しました');}

  renderNavList();renderPropForms();renderBS();

  const sel=document.getElementById('cfPropSelect');

}

// Year selector
function initYearSelect(){
  const sel=document.getElementById('annualYear');
  const cur=new Date().getFullYear();
  for(let y=cur+1;y>=cur-4;y--){
    const opt=document.createElement('option');opt.value=y;opt.textContent=y+'年';
    if(y===cur)opt.selected=true;
    sel.appendChild(opt);
  }
}

// Login
function getTodayKey(){
  const d=new Date();
  return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}
function doLogin(){
  const input=document.getElementById('loginInput')?.value||'';
  const err=document.getElementById('loginError');
  if(input===getTodayKey()+'kuma'){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appContent').style.display='block';
    sessionStorage.setItem('pfauth',getTodayKey());
    renderAll();
  } else {
    if(err){err.textContent='パスワードが違います';setTimeout(()=>{err.textContent=''},3000);}
    document.getElementById('loginInput').value='';
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  initYearSelect();
  changeMonth(0); // init month label
  const stored=sessionStorage.getItem('pfauth');
  if(stored&&stored===getTodayKey()){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appContent').style.display='block';
    renderAll();
  }
  document.getElementById('loginInput')?.focus();
});
</script>
